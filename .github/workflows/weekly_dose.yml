name: The Weekly Dose — Generate & Upload Episode

on:
  schedule:
    - cron: "0 18 * * 4"  # Torsdag 18:00 UTC = 20:00 Oslo-tid
  workflow_dispatch:       # Kan også kjøres manuelt fra GitHub

jobs:
  generate-episode:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Trengs for å lage GitHub Releases

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: podcast-script
        run: pip install -r requirements.txt

      - name: Generate episode (script + audio)
        working-directory: podcast-script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python weekly_dose.py

      - name: Upload MP3 to GitHub Releases
        id: release
        working-directory: podcast-script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MP3_FILE=$(ls output/the_weekly_dose_*.mp3 | tail -1)
          TAG="episode-$(date '+%Y%m%d-%H%M')"
          TITLE="The Weekly Dose – $(date '+%d. %B %Y')"
          gh release create "$TAG" "$MP3_FILE" \
            --title "$TITLE" \
            --notes "Auto-generated episode" \
            --repo ${{ github.repository }}
          FILENAME=$(basename "$MP3_FILE")
          AUDIO_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$FILENAME"
          echo "audio_url=$AUDIO_URL" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Publish to Buzzsprout + send newsletter via Vercel
        working-directory: podcast-script
        env:
          AUDIO_URL: ${{ steps.release.outputs.audio_url }}
          EPISODE_TITLE: ${{ steps.release.outputs.title }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          python3 - <<'EOF'
          import requests, os, sys, json

          audio_url = os.environ["AUDIO_URL"]
          title     = os.environ["EPISODE_TITLE"]
          token     = os.environ["PUBLISH_TOKEN"]

          with open("output/newsletter.json", encoding="utf-8") as f:
              newsletter = json.load(f)

          response = requests.post(
              "https://www.weeklydose.tech/api/publish-episode",
              headers={"x-publish-token": token, "Content-Type": "application/json"},
              json={
                  "audio_url": audio_url,
                  "title": title,
                  "newsletter_subject": newsletter["subject"],
                  "newsletter_bullets": newsletter["bullets"],
                  "newsletter_ending": newsletter.get("ending", ""),
              },
          )
          print(f"Status: {response.status_code}")
          print(f"Response: {response.text}")
          if response.ok:
              print("✓ Episode live on Buzzsprout + newsletter sent!")
          else:
              print("✗ Publish failed")
              sys.exit(1)
          EOF
